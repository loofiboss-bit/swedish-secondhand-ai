name: Release desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run validate:release
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
      - run: npm run validate:publication
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          V2_NO_OPEN_P0_P1: ${{ vars.V2_NO_OPEN_P0_P1 }}
          V2_NO_HIGH_SECURITY_FINDINGS: ${{ vars.V2_NO_HIGH_SECURITY_FINDINGS }}
          V2_MIGRATION_VERIFIED: ${{ vars.V2_MIGRATION_VERIFIED }}
          V2_WINDOWS_UPGRADE_VERIFIED: ${{ vars.V2_WINDOWS_UPGRADE_VERIFIED }}
          V2_LINUX_UPGRADE_VERIFIED: ${{ vars.V2_LINUX_UPGRADE_VERIFIED }}

  linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux AppImage --publish never
      - run: npm run package:smoke -- linux release
      - name: Start AppImage under Xvfb
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb
          artifact=$(find release -maxdepth 1 -name '*.AppImage' -print -quit)
          chmod +x "$artifact"
          set +e
          timeout 20s xvfb-run -a "$artifact" --no-sandbox --disable-gpu
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "AppImage startup failed with exit code $code"
            exit "$code"
          fi
      - name: Verify v1 to v2 Linux profile upgrade
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release/upgrade-v1
          for attempt in 1 2 3; do
            if gh release download v1.0.0-beta.1 --pattern '*.AppImage' \
              --dir release/upgrade-v1 --clobber; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Unable to download the v1 Linux upgrade artifact after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done
          previous=$(find release/upgrade-v1 -name '*.AppImage' -print -quit)
          current=$(find release -maxdepth 1 -name '*.AppImage' -print -quit)
          chmod +x "$previous" "$current"
          profile="$RUNNER_TEMP/swedish-secondhand-ai-upgrade-profile"
          for artifact in "$previous" "$current"; do
            set +e
            timeout 20s xvfb-run -a "$artifact" --no-sandbox --disable-gpu \
              --user-data-dir="$profile"
            code=$?
            set -e
            if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
              echo "Upgrade launch failed for $artifact with exit code $code"
              exit "$code"
            fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: release/*.AppImage
          if-no-files-found: error

  windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win nsis portable --x64 --publish never
      - run: npm run package:smoke -- windows release
      - name: Verify v1 to v2 Windows installer upgrade
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force release/upgrade-v1 | Out-Null
          $downloaded = $false
          foreach ($attempt in 1..3) {
            gh release download v1.0.0-beta.1 --pattern '*setup.exe' `
              --dir release/upgrade-v1 --clobber
            if ($LASTEXITCODE -eq 0) {
              $downloaded = $true
              break
            }
            if ($attempt -lt 3) { Start-Sleep -Seconds (5 * $attempt) }
          }
          if (-not $downloaded) {
            throw 'Unable to download the v1 Windows upgrade artifact after 3 attempts'
          }
          $previous = Get-ChildItem release/upgrade-v1 -Filter '*setup.exe' | Select-Object -First 1
          $current = Get-ChildItem release -Filter '*setup.exe' | Select-Object -First 1
          if (-not $previous -or -not $current) { throw 'Missing Windows upgrade installer' }
          $installDir = Join-Path $env:RUNNER_TEMP 'swedish-secondhand-ai-upgrade'
          foreach ($installer in @($previous, $current)) {
            $process = Start-Process $installer.FullName -ArgumentList '/S', "/D=$installDir" -Wait -PassThru
            if ($process.ExitCode -ne 0) {
              throw "Upgrade installer failed with exit code $($process.ExitCode): $($installer.FullName)"
            }
          }
          $installed = Join-Path $installDir 'Swedish Secondhand AI.exe'
          if (-not (Test-Path $installed)) { throw "Installed executable missing: $installed" }
          $app = Start-Process $installed -PassThru
          Start-Sleep -Seconds 10
          if ($app.HasExited -and $app.ExitCode -ne 0) {
            throw "Upgraded application exited with code $($app.ExitCode)"
          }
          if (-not $app.HasExited) { Stop-Process -Id $app.Id -Force }
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: release/*.exe
          if-no-files-found: error

  draft-release:
    if: github.event_name == 'push'
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release
          merge-multiple: true
      - run: npm ci --ignore-scripts
      - run: npm run sbom
      - run: npm run checksums
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          release_args=(
            --verify-tag
            --draft
            --title "Swedish Secondhand AI ${TAG}"
            --notes-file "docs/releases/${TAG}.md"
          )
          if [[ "$TAG" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "$TAG" \
            release/*.AppImage release/*.exe release/*.json release/SHA256SUMS.txt \
            "${release_args[@]}"
